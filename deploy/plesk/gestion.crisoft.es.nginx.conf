# Plesk > gestion.crisoft.es > Apache & nginx Settings:
# - disable Proxy mode and PHP support
# - paste this file into Additional nginx directives
location / {
    proxy_http_version 1.1;
    proxy_pass http://127.0.0.1:3100;

    # Overwrite client-supplied forwarding headers before TRUST_PROXY_HEADERS=true.
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    # The application accepts at most 550000 bytes for credential multipart data.
    client_max_body_size 600k;
}
