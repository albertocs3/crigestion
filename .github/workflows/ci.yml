name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crigestion_ci_test
          POSTGRES_USER: crigestion_ci
          POSTGRES_PASSWORD: crigestion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crigestion_ci -d crigestion_ci_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://crigestion_ci:crigestion@localhost:5432/crigestion_ci_test?schema=public&application_name=crigestion-vitest
      APP_ENV: test
      APP_SESSION_SECRET: ci-session-secret-0123456789abcdef
      VITEST_ALLOW_DATABASE_RESET: "true"
      VITEST_DATABASE_HOST: localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-verifactu.txt

      - name: Install VeriFactu validator
        run: python -m pip install --requirement requirements-verifactu.txt

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run test:db:prepare

      - name: Validate VeriFactu XSD offline
        run: npm run verifactu:validate-xsd && npm run verifactu:validate-r4-xsd

      - name: Build VeriFactu TEST worker image
        env:
          VERIFACTU_WORKER_ENV_FILE: .env.worker.example
          VERIFACTU_WORKER_EXPECTED_DATABASE: crigestion_ci_test
          VERIFACTU_MIGRATION_DATABASE_URL: postgresql://crigestion_ci:crigestion@postgres:5432/crigestion_ci_test?schema=public
          VERIFACTU_MIGRATION_EXPECTED_DATABASE: crigestion_ci_test
        run: |
          cp .env.docker.example .env.docker
          docker compose --profile verifactu-test config --quiet
          docker compose --profile verifactu-test build verifactu-migrate-test verifactu-worker-test

      - name: Verify release
        run: npm run verify:release
