name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crigestion
          POSTGRES_USER: crigestion
          POSTGRES_PASSWORD: crigestion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crigestion -d crigestion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://crigestion:crigestion@localhost:5432/crigestion?schema=public
      APP_ENV: test
      APP_SESSION_SECRET: ci-session-secret-0123456789abcdef

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:deploy

      - name: Verify release
        run: npm run verify:release
